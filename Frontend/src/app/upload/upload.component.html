<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo-section">
    <img src="assets/logo.png" class="logo" />
    <span class="brand">Bharari Digital Solutions</span>
  </div>
</nav>

<div *ngIf="toastMessage" class="toast" [ngClass]="toastType">
  {{ toastMessage }}
</div>

<div class="page">
  <div class="upload-card">
    <h2>Medical Record Upload</h2>
    <p class="sub-text">Upload a medical record file for processing</p>

    <input
      #fileInput
      type="file"
      accept=".docx"
      (change)="onFileSelected($event)"
    />

    <button type="button" (click)="onUpload()" [disabled]="isLoading">
      <span *ngIf="!isLoading">Upload and Process</span>
      <span *ngIf="isLoading" class="loader"></span>
    </button>

    <div *ngIf="message" class="success-box">
      <p><strong>{{ message }}</strong></p>
      <p *ngIf="outputFile">Output File: {{ outputFile }}</p>
      <a *ngIf="downloadUrl" href="#" (click)="downloadAgain($event)">Download Again</a>
    </div>

    <div *ngIf="error" class="error-box">
      {{ error }}
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  © 2026 Bharari Digital Solutions
</footer>
