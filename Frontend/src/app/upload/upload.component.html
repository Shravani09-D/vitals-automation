<nav class="topbar">
  <div class="brand-wrap">
    <img src="/assets/logo.png" class="logo" />
    <div class="brand-text">
      <h1>Bharari Digital Solutions</h1>
      <p>Medical Record Processing Portal</p>
    </div>
  </div>
</nav>

<div *ngIf="toastMessage" class="toast" [ngClass]="toastType">
  {{ toastMessage }}
</div>

<div class="page">
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <div class="upload-card">
    <div class="card-header">
      <div class="icon-circle">📄</div>
      <h2>Medical Record Upload</h2>
      <p class="sub-text">Upload a DOCX medical record file for secure processing</p>
    </div>

    <div class="upload-area">
      <label for="fileUpload" class="custom-file-upload">
        <span class="upload-icon">⬆</span>
        <span class="upload-title">Choose File</span>
        <span class="upload-desc">
          {{ selectedFile?.name ? selectedFile?.name : 'Only .docx files are allowed' }}
        </span>
      </label>

      <input
        #fileInput
        id="fileUpload"
        type="file"
        accept=".docx"
        (change)="onFileSelected($event)"
      />
    </div>

    <button type="button" class="upload-btn" (click)="onUpload()" [disabled]="isLoading">
      <span *ngIf="!isLoading">Upload and Process</span>
      <span *ngIf="isLoading" class="loader"></span>
    </button>

    <div *ngIf="message" class="success-box">
      <p><strong>{{ message }}</strong></p>
      <p *ngIf="outputFile" class="file-name">Output File: {{ outputFile }}</p>
      <a *ngIf="downloadUrl" href="#" (click)="downloadAgain($event)">Download Again</a>
    </div>

    <div *ngIf="error" class="error-box">
      {{ error }}
    </div>
  </div>
</div>

<footer class="footer">
  <p>© 2026 Bharari Digital Solutions. All rights reserved.</p>
</footer>
